version: "3.9"

services:
  # ---------- Microsserviço 1: Catálogo (livros e sócios) ----------
  db_catalogo:
    image: postgres:16
    restart: always
    environment:
      POSTGRES_USER: biblioteca
      POSTGRES_PASSWORD: biblioteca
      POSTGRES_DB: biblioteca
    volumes:
      - db_catalogo_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U biblioteca -d biblioteca"]
      interval: 5s
      timeout: 5s
      retries: 5

  catalogo-api:
    build: ./catalogo-api
    restart: always
    environment:
      DATABASE_URL: postgresql://biblioteca:biblioteca@db_catalogo:5432/biblioteca
    depends_on:
      db_catalogo:
        condition: service_healthy
    ports:
      - "8000:8000"

  # ---------- Microsserviço 2: Empréstimos ----------
  db_emprestimos:
    image: postgres:16
    restart: always
    environment:
      POSTGRES_USER: emprestimos
      POSTGRES_PASSWORD: emprestimos
      POSTGRES_DB: emprestimos
    volumes:
      - db_emprestimos_data:/var/lib/postgresql/data
    ports:
      - "5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U emprestimos -d emprestimos"]
      interval: 5s
      timeout: 5s
      retries: 5

  emprestimos-api:
    build: ./emprestimos-api
    restart: always
    environment:
      DATABASE_URL: postgresql://emprestimos:emprestimos@db_emprestimos:5432/emprestimos
      CATALOGO_API_URL: http://catalogo-api:8000
    depends_on:
      db_emprestimos:
        condition: service_healthy
      catalogo-api:
        condition: service_started
    ports:
      - "8001:8000"

    # ---------- Frontend ----------
  # frontend:
  #   build: ./SistemaBibliotecaFrontend
  #   restart: always
  #   depends_on:
  #     - catalogo-api
  #     - emprestimos-api
  #   ports:
  #     - "5500:80"

volumes:
  db_catalogo_data:
  db_emprestimos_data:
