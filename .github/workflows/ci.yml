name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service:
          - path: catalogo-api
            name: catalogo-api
          - path: emprestimos-api
            name: emprestimos-api

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependências (${{ matrix.service.name }})
        working-directory: ${{ matrix.service.path }}
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Rodar testes de saúde (${{ matrix.service.name }})
        working-directory: ${{ matrix.service.path }}
        run: pytest tests/ -v